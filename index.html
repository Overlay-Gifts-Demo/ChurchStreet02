<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JEWELS-AI | Fast Drive AR</title>

    <!-- AFRAME -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- MINDAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { 
        margin: 0; 
        background: #000; 
        overflow: hidden; 
        font-family: 'Segoe UI', sans-serif; 
      }

      /* BLACK CURTAIN */
      #blackCurtain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease;
      }

      #loader {
        color: white;
        text-align: center;
        font-size: 18px;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
      }

      /* UI BUTTON */
      #ui { 
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: none;
      }

      button { 
        padding: 15px 30px;
        background: #5E0F8B;
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      }

      /* Hide MindAR default UI */
      [class^="mindar-ui"], 
      [id^="mindar-ui"] { 
        display: none !important; 
      }

      /* Force black background until camera loads */
      a-scene, .a-canvas {
        background-color: #000 !important;
      }
    </style>
</head>

<body>

    <!-- LOADING CURTAIN -->
    <div id="blackCurtain">
      <div id="loader">Initializing JEWELS-AI...</div>
    </div>

    <!-- START BUTTON -->
    <div id="ui">
      <button id="playBtn">START AR EXPERIENCE</button>
    </div>

    <!-- AR SCENE -->
    <a-scene id="ar-scene" 
             mindar-image="imageTargetSrc: ./targets/placeholder.mind; uiLoading: no; uiError: no;"
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="ar-video"
               loop="true"
               crossorigin="anonymous"
               playsinline
               webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0"
                look-controls="enabled: false">
      </a-camera>

      <a-entity id="example-target"
                mindar-image-target="targetIndex: 0">

        <a-video id="videoPlane"
                 src="#ar-video"
                 width="1"
                 height="0.55"
                 position="0 0 0"
                 visible="false">
        </a-video>

      </a-entity>

    </a-scene>

    <!-- LOAD YOUR MAIN SCRIPT -->
    <script src="./script.js"></script>

</body>
</html>
